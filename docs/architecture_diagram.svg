<text font-family="sans-serif" font-size="12" x="340" y="86" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Python (Faker) → trades.csv → Snowflake COPY INTO → RAW.TRADES_RAW</text>
<rect x="40" y="134" width="600" height="56" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="156" text-anchor="middle" dominant-baseline="central" fill="#26215C">DBT staging layer</text>
<text font-family="sans-serif" font-size="12" x="340" y="174" text-anchor="middle" dominant-baseline="central" fill="#3C3489">stg_trades_raw — type casting, cleaning, null filtering</text>
