<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="248" text-anchor="middle" dominant-baseline="central" fill="#412402">DBT intermediate layer — business rules</text>
<text font-family="sans-serif" font-size="12" x="160" y="272" text-anchor="middle" fill="#633806">Rule 1: reject lower version</text>
<text font-family="sans-serif" font-size="12" x="160" y="292" text-anchor="middle" fill="#633806">Rule 2: replace same version</text>
<text font-family="sans-serif" font-size="12" x="340" y="272" text-anchor="middle" fill="#633806">Rule 3: reject past maturity</text>
<text font-family="sans-serif" font-size="12" x="340" y="292" text-anchor="middle" fill="#633806">Rule 4: mark as expired</text>
<text font-family="sans-serif" font-size="12" x="520" y="272" text-anchor="middle" fill="#633806">Rule 5: reject zero notional</text>
<text font-family="sans-serif" font-size="12" x="520" y="292" text-anchor="middle" fill="#633806">Rule 6: log all rejections</text>
<rect x="40" y="350" width="310" height="56" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="195" y="372" text-anchor="middle" dominant-baseline="central" fill="#085041">MART.TRADES_VALID</text>
<text font-family="sans-serif" font-size="12" x="195" y="390" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Active + expired trades</text>
<rect x="330" y="350" width="310" height="56" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="485" y="372" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">MART.TRADES_REJECTED</text>
<text font-family="sans-serif" font-size="12" x="485" y="390" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Rejected + reason + timestamp</text>
<rect x="40" y="452" width="600" height="64" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="474" text-anchor="middle" dominant-baseline="central" fill="#042C53">Airflow orchestration — daily 06:00 UTC</text>
<text font-family="sans-serif" font-size="12" x="340" y="494" text-anchor="middle" dominant-baseline="central" fill="#185FA5">ingest → dbt_staging → dbt_intermediate → dbt_mart → dbt_tests → health_check → audit_log</text>
<rect x="40" y="546" width="280" height="72" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="180" y="570" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Monitoring</text>
<text font-family="sans-serif" font-size="12" x="180" y="590" text-anchor="middle" fill="#444441">AUDIT.PIPELINE_AUDIT_LOG</text>
<text font-family="sans-serif" font-size="12" x="180" y="606" text-anchor="middle" fill="#444441">Snowflake account_usage views</text>
<rect x="360" y="546" width="280" height="72" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="500" y="570" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">CI / CD</text>
<text font-family="sans-serif" font-size="12" x="500" y="590" text-anchor="middle" fill="#444441">GitHub Actions — dbt compile + test</text>
<text font-family="sans-serif" font-size="12" x="500" y="606" text-anchor="middle" fill="#444441">on PR + deploy on merge to main</text>
