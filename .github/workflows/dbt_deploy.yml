name: DBT Deploy - On merge to main

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'

jobs:
  dbt-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install DBT
        run: pip install dbt-snowflake

      - name: Create DBT profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << PROFILE
          trade_pipeline:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: SYSADMIN
                warehouse: TRADE_WH
                database: TRADE_DB
                schema: STAGING
                threads: 4
          PROFILE

      - name: DBT run
        working-directory: dbt/trade_pipeline
        run: dbt run

      - name: DBT test
        working-directory: dbt/trade_pipeline
        run: dbt test
